name: Bug Report
description: Report a bug in @germondai/blog
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below to help us reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Set config option X to Y
        2. Run `bun dev`
        3. Navigate to /blog/...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: blog.config.ts (relevant parts)
      description: Share the relevant parts of your config (remove personal info).
      render: typescript

  - type: input
    id: url
    attributes:
      label: Affected URL (optional)
      description: The URL of the page where the bug occurs.
      placeholder: https://...

  - type: dropdown
    id: bun-version
    attributes:
      label: Bun version
      options:
        - 1.3.14 (latest)
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Docker version if applicable.
      placeholder: |
        OS: macOS 15
        Browser: Chrome 125
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error logs (optional)
      description: Paste any relevant error output.
      render: shell
