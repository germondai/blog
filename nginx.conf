server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        text/plain
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;
    gzip_min_length 1024;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Aggressive caching for immutable assets
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Short cache for HTML pages
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header X-Content-Type-Options "nosniff";
    }

    # Medium cache for other static assets
    location ~* \.(ico|webp|png|jpg|jpeg|gif|svg|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header X-Content-Type-Options "nosniff";
    }

    # RSS and sitemap - short cache
    location ~* \.(xml|txt)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Canonical sitemap redirect
    location = /sitemap.xml {
        return 301 /sitemap-index.xml;
    }

    # Locale-specific 404 pages
    map $uri $locale_404_page {
        ~^/cs(/|$) /cs/404.html;
        ~^/sk(/|$) /sk/404.html;
        ~^/pl(/|$) /pl/404.html;
        default     /404.html;
    }
    error_page 404 = @not_found;
    location @not_found {
        internal;
        try_files $locale_404_page =404;
    }

    location / {
        try_files $uri $uri/index.html $uri.html @not_found;
    }
}
